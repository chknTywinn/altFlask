<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='output.css') }}">
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">Uredi zapis</h1>
        
        <form method="POST" action="/update/{{ note.doc_id }}" class="bg-white p-6 rounded-lg shadow-lg space-y-4">
            <div>
                <label for="title" class="block text-lg font-medium text-gray-700">Title</label>
                <input type="text" name="title" id="title" value="{{ note.naslov }}" class="w-full p-2 border border-gray-300 rounded-md" required>
            </div>

            <div>
                <label for="content" class="block text-lg font-medium text-gray-700">Content</label>
                <textarea name="content" id="content" class="w-full p-2 border border-gray-300 rounded-md" required>{{ note.vsebina }}</textarea>
            </div>

            <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-md hover:bg-blue-600 transition duration-300">Shrani</button>
        </form>
    </div>

</body>
</html>
